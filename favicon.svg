<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff9d"/>
      <stop offset="50%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00ff9d"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="neonStrong">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#00ff9d" stroke-width="0.5">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Outer hexagon glow -->
  <polygon
    points="256,72 403,158 403,354 256,440 109,354 109,158"
    fill="none"
    stroke="#00ff9d"
    stroke-width="3"
    opacity="0.15"
    filter="url(#neonStrong)"
  />

  <!-- Outer hexagon -->
  <polygon
    points="256,72 403,158 403,354 256,440 109,354 109,158"
    fill="none"
    stroke="#00ff9d"
    stroke-width="2.5"
    opacity="0.4"
  />

  <!-- Inner hexagon filled -->
  <polygon
    points="256,110 375,178 375,334 256,402 137,334 137,178"
    fill="#0a0a0f"
    stroke="#00ff9d"
    stroke-width="2"
    opacity="0.6"
  />

  <!-- Notepad body -->
  <g filter="url(#neon)">
    <!-- Page shape -->
    <path
      d="M195,155 L335,155 L335,370 L195,370 Z"
      fill="#12121a"
      stroke="url(#glow)"
      stroke-width="3"
    />

    <!-- Folded corner -->
    <path
      d="M295,155 L335,155 L335,195 Z"
      fill="#1a1a25"
      stroke="url(#glow)"
      stroke-width="2"
    />
    <line x1="295" y1="155" x2="335" y2="195" stroke="url(#glow)" stroke-width="2"/>

    <!-- Ruled lines -->
    <g stroke="#00ff9d" stroke-width="1.5" opacity="0.5">
      <line x1="215" y1="200" x2="315" y2="200"/>
      <line x1="215" y1="228" x2="305" y2="228"/>
      <line x1="215" y1="256" x2="290" y2="256"/>
      <line x1="215" y1="284" x2="310" y2="284"/>
      <line x1="215" y1="312" x2="270" y2="312"/>
    </g>

    <!-- Margin line -->
    <line x1="215" y1="170" x2="215" y2="355" stroke="#00ffff" stroke-width="1" opacity="0.3"/>

    <!-- Pencil -->
    <g transform="translate(305, 320) rotate(-45)">
      <!-- Pencil body -->
      <rect x="0" y="-8" width="70" height="16" rx="2" fill="#1a1a25" stroke="#00ff9d" stroke-width="2"/>
      <!-- Pencil tip -->
      <polygon points="0,-8 -16,0 0,8" fill="#00ff9d" opacity="0.8"/>
      <!-- Pencil eraser -->
      <rect x="62" y="-8" width="14" height="16" rx="2" fill="#ff00ff" opacity="0.5" stroke="#ff00ff" stroke-width="1"/>
      <!-- Pencil detail lines -->
      <line x1="20" y1="-8" x2="20" y2="8" stroke="#00ff9d" stroke-width="1" opacity="0.3"/>
      <line x1="50" y1="-8" x2="50" y2="8" stroke="#00ff9d" stroke-width="1" opacity="0.3"/>
    </g>
  </g>

  <!-- Checkbox / todo indicator -->
  <g filter="url(#neon)" transform="translate(160, 195)">
    <rect x="0" y="0" width="18" height="18" rx="3" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.7"/>
    <polyline points="4,9 8,14 15,4" fill="none" stroke="#00ff9d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Scan line effect -->
  <g opacity="0.03">
    <rect x="0" y="0" width="512" height="2" fill="#00ff9d"/>
    <rect x="0" y="8" width="512" height="1" fill="#00ff9d"/>
    <rect x="0" y="16" width="512" height="2" fill="#00ff9d"/>
    <rect x="0" y="24" width="512" height="1" fill="#00ff9d"/>
  </g>
</svg>
